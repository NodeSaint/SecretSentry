[pytest]
# Pytest configuration for Secrets Sentry

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Output options
addopts =
    # Show extra test summary info
    -ra
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options (if pytest-cov is installed)
    # --cov=src
    # --cov-report=term-missing
    # --cov-report=html
    # --cov-report=xml
    # Warnings
    -W ignore::DeprecationWarning
    # Fail on first error (comment out for full test run)
    # -x

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    git: marks tests that require git operations
    requires_git: tests that need git to be available

# Test output
console_output_style = progress

# Timeout (if pytest-timeout is installed)
# timeout = 300

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Default exclude patterns
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
